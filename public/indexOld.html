<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Meet Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161a24;
      --border: #252b3b;
      --accent: #00c896;
      --accent-dim: rgba(0, 200, 150, 0.12);
      --text: #e8eaf0;
      --muted: #6b7280;
      --danger: #f87171;
      --google-blue: #4285f4;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "DM Sans", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 80%, rgba(0,200,150,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(66,133,244,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 480px;
      text-align: center;
      position: relative;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.5rem;
      background: var(--accent-dim);
      border: 1px solid rgba(0,200,150,0.3);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    /* Auth section */
    #auth-section {
      display: none;
      flex-direction: column;
      gap: 1rem;
    }

    #meet-section {
      display: none;
      flex-direction: column;
      gap: 1rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.85rem 1.5rem;
      border-radius: 12px;
      font-family: "DM Sans", sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      text-decoration: none;
      width: 100%;
    }

    .btn-google {
      background: var(--google-blue);
      color: #fff;
    }
    .btn-google:hover { background: #3b78e7; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(66,133,244,0.3); }

    .btn-primary {
      background: var(--accent);
      color: #0d1a14;
      font-weight: 600;
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,200,150,0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* Spinner inside button */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0d1a14;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result box */
    #result-box {
      display: none;
      background: var(--accent-dim);
      border: 1px solid rgba(0,200,150,0.25);
      border-radius: 14px;
      padding: 1.25rem;
      text-align: left;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #result-box .label {
      font-family: "Space Mono", monospace;
      font-size: 0.65rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.5rem;
    }

    #meet-link-text {
      font-family: "Space Mono", monospace;
      font-size: 0.8rem;
      color: var(--text);
      word-break: break-all;
      line-height: 1.6;
    }

    .copy-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn-copy {
      flex: 1;
      padding: 0.6rem;
      font-size: 0.85rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--border);
      cursor: pointer;
      font-family: "DM Sans", sans-serif;
      transition: all 0.2s;
    }
    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }

    .btn-join {
      flex: 1;
      padding: 0.6rem;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 8px;
      background: var(--accent);
      color: #0d1a14;
      border: none;
      cursor: pointer;
      font-family: "DM Sans", sans-serif;
      text-decoration: none;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      transition: all 0.2s;
    }
    .btn-join:hover { filter: brightness(1.1); }

    #error-msg {
      display: none;
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--danger);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      text-align: left;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2rem;
    }
    .badge .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📹</div>
    <h1>Meet Generator</h1>
    <p class="subtitle">Instantly spin up a Google Meet link.<br/>Sign in once, generate anytime.</p>

    <!-- Auth prompt -->
    <div id="auth-section">
      <a class="btn btn-google" href="/auth/login">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.9 29.3 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 6 1.1 8.2 3l5.9-5.9C34.5 5.1 29.5 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.9 0 20-7.9 20-21 0-1.3-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.8 5C15 16 19.2 13 24 13c3.1 0 6 1.1 8.2 3l5.9-5.9C34.5 5.1 29.5 3 24 3 16.3 3 9.7 7.9 6.3 14.7z"/><path fill="#4CAF50" d="M24 45c5.3 0 10.2-1.9 13.9-5l-6.4-5.4C29.4 36.5 26.8 37 24 37c-5.2 0-9.6-3-11.5-7.5L5.7 35c3.4 6.8 10.3 10 18.3 10z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.5-2.4 4.6-4.4 6l6.4 5.4C41 35.5 44 30.3 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
        Sign in with Google
      </a>
      <p style="color:var(--muted);font-size:0.78rem;">Required to access Google Calendar API</p>
    </div>

    <!-- Meet generation -->
    <div id="meet-section">
      <button class="btn btn-primary" id="generate-btn" onclick="generateMeet()">
        <span id="btn-spinner" class="spinner"></span>
        <span id="btn-label">🎬 Generate Meet Link</span>
      </button>

      <div id="error-msg"></div>

      <div id="result-box">
        <div class="label">✦ Meet Link Ready</div>
        <div id="meet-link-text"></div>
        <div class="copy-row">
          <button class="btn-copy" onclick="copyLink()">📋 Copy</button>
          <a id="join-btn" class="btn-join" href="#" target="_blank" rel="noopener">
            Join Now →
          </a>
        </div>
      </div>

      <hr class="divider" />
      <button class="btn btn-outline" onclick="generateMeet()">⟳ Generate New Link</button>
    </div>

    <div class="badge"><span class="dot"></span> Powered by Google Calendar API</div>
  </div>

  <script>
    let currentMeetLink = "";

    async function checkAuth() {
      const res = await fetch("/api/auth-status");
      const data = await res.json();

      if (data.authenticated) {
        document.getElementById("auth-section").style.display = "none";
        document.getElementById("meet-section").style.display = "flex";
      } else {
        document.getElementById("auth-section").style.display = "flex";
        document.getElementById("meet-section").style.display = "none";
      }
    }

    async function generateMeet() {
      const btn = document.getElementById("generate-btn");
      const spinner = document.getElementById("btn-spinner");
      const label = document.getElementById("btn-label");
      const errorMsg = document.getElementById("error-msg");
      const resultBox = document.getElementById("result-box");

      // Reset UI
      btn.disabled = true;
      spinner.style.display = "block";
      label.textContent = "Creating…";
      errorMsg.style.display = "none";
      resultBox.style.display = "none";

      try {
        const res = await fetch("/api/create-meet", { method: "POST" });
        const data = await res.json();

        if (!res.ok || data.error) {
          throw new Error(data.error || "Something went wrong.");
        }

        currentMeetLink = data.meetLink;

        document.getElementById("meet-link-text").textContent = data.meetLink;
        document.getElementById("join-btn").href = data.meetLink;
        resultBox.style.display = "block";
      } catch (err) {
        errorMsg.textContent = "⚠ " + err.message;
        errorMsg.style.display = "block";
      } finally {
        btn.disabled = false;
        spinner.style.display = "none";
        label.textContent = "🎬 Generate Meet Link";
      }
    }

    function copyLink() {
      if (!currentMeetLink) return;
      navigator.clipboard.writeText(currentMeetLink).then(() => {
        const btn = document.querySelector(".btn-copy");
        btn.textContent = "✓ Copied!";
        setTimeout(() => (btn.textContent = "📋 Copy"), 2000);
      });
    }

    // Check auth on page load
    checkAuth();
  </script>
</body>
</html>
